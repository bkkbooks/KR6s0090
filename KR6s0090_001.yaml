body:
  text: 大唐翻經沙門釋靖邁撰後漢劉氏都洛陽惟孝明皇帝以永平三年歲次庚申帝夢金人項有日月光飛來殿庭上問群臣太史傅毅對曰臣聞西域有神號之為佛陛下所夢固其是乎至七年歲次甲子帝勅郎中蔡愔中郎將秦景博士王遵等一十八人西尋佛法愔等至印度國請迦葉摩騰竺法蘭共還用白馬馱經并將畫釋迦佛像以永平十年歲次丁卯至于洛陽帝悅造白馬寺至十四年歲次辛未正月一日五岳道士楮善信等負情不悅因朝正之次表請較試勅遣尚書令宋庠引入長樂宮帝曰此月十五日大集白馬寺南門爾日信等以靈寶諸經置道東壇上帝以經像舍利置道西七寶行殿上信等遶壇涕泣稽請天尊詞情懇切又以栴檀柴等燒經冀經無損以為神異然所燒經並從灰燼先時昇天入火履水隱形皆不復能善禁呪者呼策不應時太傅張衍語信曰所試無驗即是虛妄宜就西域真法時南嶽道士費叔才等慚忸自感而死時佛舍利光明五色直上空中旋環如蓋遍覆大眾映蔽日輪摩騰法師先是阿羅漢即以神足遊空飛行坐臥神化自在時天雨寶華及奏作眾樂感動人情大眾歡悅摩騰復坐法蘭說法時眾咸喜得未曾有時後宮陰夫人王婕妤等一百九十人出家司空陽城侯劉善峻鎮遠將軍姜苟兒等二百六十八人出家四岳道士呂慧通等六百二十人出家京都男女張子尚阿潘等三百九十一人出家帝親與群官為出家者剃髮給施供養經三十日造寺十所城外七寺城內三寺七寺安僧三寺安尼具如漢明帝法本內傳說沙門迦葉摩騰中印度人婆羅門種幼而敏悟兼有風姿博學多聞特明經律思力精博探𭭻鉤深敷文析理每有新義出於神表嘗遊西印度有一小國請騰講金光明經俄而隣國興師而來既將踐境輒有事礙兵不能進彼國兵眾疑有異術密遣使覘但見君臣安然共聽其所講大乘經明地神王護國之法於是彼國既覩斯神驗請和求法時蔡愔等殷請於騰騰遂與愔等俱來見帝於洛陽以永平十年歲次丁卯於白馬寺譯四十二章經一卷此經本是外國經抄騰以大化初傳人未深信蘊其妙解不即多翻且撮經要以導時俗騰後終於洛陽沙門竺法蘭中印度人少而機悟淹雅博愛多通禪思毘尼莫不窮妙誦經百餘萬言學徒千餘居不求安常懷弘利戒軌嚴峻眾莫能窺遇愔求請便有輕舉之志而國主不聽密與騰同來間行後至以漢明帝時初共騰譯四十二章經騰卒蘭以永平十一年歲次戊辰至十三年庚午自譯佛本行經五卷十地斷結經四卷法海藏經三卷佛本生經二卷二百六十戒合異二卷總五部一十六卷初武帝穿昆明池得灰墨問東方朔朔云可問西域胡人法蘭既至時以追問蘭曰此是劫燒之灰又將優填王旃檀像樣至洛帝即勅令圖寫供養沙門支婁迦讖月支國人操行純深性度開敏稟持法戒諷誦群經志在宣弘遊方化物以桓帝建和元年歲次丁亥至靈帝中平三年歲次丙寅於洛陽譯阿閦佛國經二卷大集經二十七卷般若道行品經十卷首楞嚴經二卷屯真陀羅尼經二卷阿闍世王經二卷無量清淨經二卷孛本經二卷般舟三昧經二卷古品遺日說般若經一卷寶積經一卷問署經一卷梵般泥洹經一卷阿闍世王問五逆經一卷兜沙經一卷內藏百品經一卷大方便報恩經一卷光明三昧經一卷禪經一卷雜譬喻經一卷阿育王太子壞目因緣經一卷總二十一部合六十三卷審得本旨曾不加飾可謂善宣法要弘道之士河南清信士孟福張蓮等筆受沙門安清字世高安息國太子王薨讓國於叔出家遊方以漢桓帝建和二年至止未久大善漢言初自稱前身出家有一同學性多瞋恚高曰卿以此故當受惡形我必相度乃與辭曰吾往廣州以償宿對既至番禺路逢少年拔刀向高高笑而言曰故來相償耳遂引頸受刃於是還復高身譯經如故久之乃曰須度昔日同學遂行達䣏亭湖廟廟神嚴烈船人祈廟降呪呼高曰昔與子同學今壽盡旦夕恐此醜形穢於江湖當死山西澤中又懼墮地獄今有絹千匹及雜寶等願為營塔欲現醜形恐眾人懼高曰但現無苦神遂出頭乃是大蟒高向之胡語并為讚唄蟒悲泣而退高時達豫章即為造寺創基之始有一年少高前受呪願訖因忽不見高曰彼得離惡形也後人山西澤中見一死蟒頭尾數里今潯陽郡有蛇村是也高又往廣州尋前世害己年少尚在共說宿緣曰猶有餘報當往會稽畢之隨高至彼市中有亂相打誤著高頭而死尋于眾錄序高之事互有出沒將以神迹難知見聞異耳自桓帝建初二年歲次戊子至靈帝建寧三年歲次庚戌譯出修行道地經七卷或六卷法句經四卷大僧威儀經四卷五十挍計經二卷雜四十四篇經二卷七處三觀經二卷十報經二卷大道地經二卷道意發行經二卷禪經二卷安般守意經二卷無量壽經二卷陰持入經一卷百六十品經一卷大十二門經一卷小十二門經一卷人本欲生經一卷阿毘曇五法經一卷七法經一卷普法義經一卷漏分布經一卷四諦經一卷九橫經一卷八正道經一卷大安般經一卷思惟要略經一卷十二因緣經一卷五陰喻經一卷轉法輪經一卷流攝經一卷是法非法經一卷法受塵經一卷十四意經一卷本相猗致經一卷阿毘曇九十八結經一卷禪行法想經一卷禪行三十七品經一卷難提迦羅越經一卷獨富長者經一卷長者懊惱三處經一卷由起長者悔過經一卷佛為那拘說根熟經一卷長者兄弟詣佛經一卷佛神力救長者子經一卷阿那邠祁化七子經一卷十支居士八城人經一卷無畏離車白阿難經一卷受呪願經一卷長者子制經一卷郁伽居士見佛聞法醒悟經一卷得非常觀經一卷舍頭諫經一卷出家因緣經一卷佛度栴陀羅兒出家經一卷純陀沙彌經一卷外道出家經一卷精進四