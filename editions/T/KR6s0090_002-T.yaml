body:
  text: 大唐翻經沙門釋靖邁撰西晉司馬氏都洛陽沙門竺曇摩羅察此言法護本姓支後改姓竺月支國人八歲出家甚有識量天性純懿操行精苦篤志好學萬里尋師屆茲未久而博覽六經遊心七籍解三十六種書詁訓音義無不備識日誦萬言過目咸記妙閑三藏奉經遊方先居燉煌後詣京洛自晉武帝太始元年歲次丙戌訖于敏帝建興元年爰暨江左所在翻譯雜譬喻三百五十首二十五卷光讚般若經十卷新道行經十卷漸備一切智經十卷閑居經十卷正法花經十卷普耀經八卷颰陀劫三昧經七卷修行經七卷大哀經七卷賢劫經七卷小品經七卷薩芸分陀利經六卷持心經六卷度世品經六卷密迹金剛力士經五卷樓炭經五卷生經五卷如來興顯經五卷阿差末經四卷無盡意經四卷寶女經四卷普超經四卷海龍王經四卷阿惟越致經四卷持人菩薩所問經三卷等集眾德三昧經三卷超日明三昧經三卷菩薩藏經三卷諸神呪經三卷寶髻菩薩所問經二卷須真天子經二卷文殊師利佛土嚴淨經二卷弘道廣顯三昧經二卷大般泥洹經二卷無量壽經二卷首楞嚴經二卷寶藏經二卷要集經二卷般舟三昧經二卷大善權經二卷順權方便經二卷隨權女經二卷如幻三昧經二卷等目菩薩經二卷勇伏定經二卷更出阿闍世王經一卷賈客經二卷文殊師利現寶藏經二卷佛昇忉利天為母說法經一卷仁王般若波羅蜜經一卷普門品經一卷月光童子經一卷金剛藏菩薩行經一卷大淨法門經一卷離垢施女經一卷須摩提菩薩經一卷龍施女經一卷大方等頂王經一卷無所悕望經一卷魔逆經一卷濟諸方等學經一卷菩薩行五十緣身經一卷彌勒菩薩所問本願經一卷文殊師利淨律經一卷無極寶三昧經一卷寶網童子經一卷普法義經一卷文殊師利悔過經一卷滅十方冥經一卷菩薩十地經一卷溫室洗浴眾僧經一卷賴吒和羅所問光德太子經一卷當來變經一卷五百弟子自說本起經一卷師子月佛生經一卷迦葉結集傳經一卷㮈女耆域經一卷胞胎經一卷維摩詰所說法門經一卷郁伽羅越問菩薩行經一卷幻士仁賢經一卷決總持經一卷首意女經一卷舍頭諫經一卷十二因緣經一卷六十二見經二卷四自侵經一卷無言童子經一卷聖法印經一卷移山經一卷無思議孩童菩薩經一卷彌勒成佛經一卷舍利弗目連遊諸國經一卷流離王經一卷寶施女經一卷佛為菩薩五夢經一卷摩訶目揵連本經一卷太子墓魄經一卷四不可得經一卷菩薩悔過法經一卷乳光經一卷心明女梵志婦飯汁施經一卷大六向拜經一卷鴦掘魔經一卷菩薩十住經一卷摩調王經一卷照明三昧經一卷所欲致患經一卷法沒盡經一卷菩薩齋法經一卷獨證自誓三昧經一卷過去佛分衛經一卷五蓋疑結失行經一卷總持經一卷無憂施經一卷五福施經一卷嚴淨定經一卷慧明經一卷大迦葉本經一卷光世音大勢至受決經一卷諸方佛名功德經一卷目連上淨居天經一卷普首童真經一卷十方佛名經一卷三品修行經一卷金益長者子經一卷眾祐經一卷觀行不移四事經一卷小法沒盡經一卷四婦喻經一卷廬夷亘經一卷廅羅王經一卷檀若經一卷龍施經一卷馬王經一卷鹿母經一卷給孤獨明德經一卷龍王兄弟施達試王經一卷勸化王經一卷百佛名經一卷殖眾德本經一卷沙門果證經一卷佛悔過經一卷三轉月明經一卷解無常經一卷胎藏經一卷離垢蓋經一卷小郁伽經一卷阿闍貰女經一卷人所從來經一卷誡羅云經一卷鴈王經一卷十等藏經一卷雁王五百雁俱經一卷誡具經一卷決道俗經一卷猛施經一卷城喻經一卷誡王經一卷菩薩齋經一卷多聞經一卷彌勒菩薩為女身經一卷離睡經一卷文殊師利菩薩經一卷寤意經一卷寶日光明菩薩經一卷樂想經一卷尊上經一卷身觀經一卷醫王經一卷法觀經一卷意經一卷降龍經一卷應法經一卷邪見經一卷何苦經一卷受歲經一卷貧窮經一卷灌臘經一卷密具經一卷悔過經一卷犯罪經一卷法社經一卷雜讚經一卷盂蘭經一卷分別經一卷腹使經一卷苦應經一卷閑居經一卷四種人經一卷七寶經一卷四未曾有經一卷八陽經一卷三十二相因緣經一卷四自在神通經一卷慈仁問八十種好經一卷夫那羅經一卷隨藍本經一卷貧女為國王夫人經一卷寶女問慧經一卷七女本經一卷女人慾熾荒迷經一卷悉鞞梨天子詣佛說偈經一卷梵王變身經一卷光世音經一卷惟明二十偈經一卷三品悔過經一卷耆闍崛山解經一卷比丘尼戒經一卷眾經目錄一卷合二百一十部總三百九十四卷清信士聶承遠筆受沙門彊梁婁至者此云真喜西域人也志情曠放弘化在懷以晉武帝太康二年歲次辛丑於廣州譯十二遊經一卷沙門安法欽安息國人學贍眾經語兼晉俗幽鑒無滯剋暢玄門以晉武帝太康二年歲次辛丑訖惠帝光熙元年歲次丙寅於雒陽譯大阿育王經五卷道神足無極變化經一卷文殊師利現寶藏經二卷阿闍世王經二卷阿難目佉經一卷總五部合一十二卷沙門無羅叉者于殿國人以晉惠帝元康元年歲次辛亥於倉恒水南寺譯放光般若經二十卷此經梵本是沙門朱仕行於于闐遣弟子弗如檀送還雒陽檀未發頃彼小乘學僧詣王讒仕行云經非佛說仕行于時即求燒經為證王即許焉於是積火焚之投經火中火滅經存更增光淨王臣驚駭咸稱神感遂送達此沙門竺叔蘭者西域人也解標眾望行潔群先於晉惠帝世遊化之雒於雒陽譯異毘摩羅詰經三卷首楞嚴經二卷凡二部合五卷沙門白法祖河內人也本姓萬氏少便出家才思㑺徹敏朗絕倫誦經日八九千言研味方等妙入幽微世俗墳素多所該貫乃於長安造立精舍講習為業太