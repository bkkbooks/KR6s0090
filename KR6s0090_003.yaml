body:
  text: 大唐翻經沙門釋靖邁撰秦符氏都長安沙門曇摩特此言法海西域人善持律藏妙入契經以符秦建元三年歲次辛未共竺佛念於長安譯十誦比丘戒本一卷授尼二歲壇文一卷凡二部合二卷惠澤筆受沙門釋惠常戒軌嚴峻慧善毗尼共曇摩特竺佛念等以符秦建元四年歲次壬申於長安譯比丘尼大戒一卷沙門鳩摩羅佛提此言童覺西域人以符秦建元五年至七年歲次乙亥共竺佛念佛護等於長安安鄴寺譯四阿含暮抄經一部二卷沙門僧導曇究僧睿等筆受沙門僧伽跋澄此云衆現罽賓國人毅然有淵懿之量歷尋名師備集三藏博覽衆經暗誦毗婆沙貫其妙旨浪志遊方觀風弘化以符秦建元十七年歲次乙酉來入關中共釋道安等譯雜阿毗曇婆沙論一部一十四卷尊者婆須蜜所集論一部十卷僧伽羅剎集經三卷合三部二十七卷至建元二十一年歲次己丑訖佛圖羅察傳語沙門敏智及黃門郎趙文業筆受沙門曇摩蜱此言法愛印度人器宇明敏志好弘誘以符秦建元十八年歲次丙戌與竺佛念共於長安譯摩訶般若波羅蜜經抄一部五卷沙門曇摩難提此言法喜兜佉勒國人齠年離俗聰慧夙成研諷經典以專精致業遍觀三藏暗誦阿含博識洽聞靡所不綜外國遠近咸共推伏少而觀方遍涉諸國常以弘化為務以符秦建元年中達于長安堅先聞提譽深見禮接以建元二十年歲次戊子堅遣道安集義學僧請難提譯中阿含經五十九卷增一阿含經五十一卷阿育王太子法益壞目因緣經一卷僧伽羅剎集經三卷三法度經二卷總五部合一百一十四卷沙門竺佛念度語慧嵩筆受秦姚氏都常安沙門竺佛念涼州人弱年離俗志業清高外和內朗通鑒明敏綜習群經尤工蒼雅家世西河洞曉方語梵秦音義莫不博洽符秦建元年與跋澄等同入長安為澄等度語於符姚二代為譯人之宗然念自符秦建元十年歲次戊寅訖至姚秦譯出耀論二十卷菩薩瓔珞經一十二卷十住斷結經一十一卷鼻奈耶經十卷十地斷結經十卷菩薩處胎經五卷大方等無相經五卷持人菩薩經三卷菩薩普處經三卷菩薩瓔珞本業經二卷王子法益壞目因緣經一卷中陰經二卷十誦比丘尼戒所出本末一卷總一十三部合八十二卷沙門曇摩耶舍此言法稱罽賓國人少而好學長而彌篤神爽高雅該覽經律陶思八禪遊心七覺明悟出群幽鑒物表欲苦節求果天神悟云何不觀方弘化而獨守小善於是歷遊諸國遂以曠濟為懷常有聖僧或五或三執錫自空詣法稱談話以晉安帝隆安年中達于廣州於白沙寺為清信女張普明譯差摩經一卷又以姚秦弘始九年歲次丙午至十六年歲次癸丑於長安譯舍利弗阿毗曇一部二十二卷秦太子泓親管理味沙門釋道摽制序凡二部二十三卷沙門鳩摩羅什婆此言童壽本印度人父以聰敏見稱龜茲王聞以女妻之而生於什什居胎日母增辨慧七歲出家日誦千偈義旨亦通至年九歲與外道論義辨挫其邪鋒咸皆愧伏年十二有阿羅漢奇之謂其母曰常守護之若年三十五不破戒者當大興佛法度無數人又習五明論四韋陀典陰陽星算必窮其妙後轉習大乘數破外道遠近諸國咸謂神異母生什後亦即出家聰拔衆尼得第三果什既受具母謂之曰方等深教應大闡秦都於汝自身無利如何什曰菩薩之行利物亡軀大化必行爐鑊無恨從此已後廣誦大乘洞其祕奧西域諸王請什講說必長跪座側命什踏而登焉符堅建元九年歲在丁丑太史奏云有星現外國當有大德智人入輔中國堅曰朕聞西有羅什襄陽有道安將非此耶後果遣將軍呂光等率兵七萬西伐龜茲光與什同來什在道數言應變光盡用之光於是即據西涼亦請什留至姚秦弘始三年興滅乃召方入長安秦主興厚加禮之延入西明閣及逍遙園別館安置敕僧䂮等八百沙門咨受什旨興卑萬乘之心尊三寶之教於草堂寺共三千僧手執舊經而參定之莫不精究洞其深旨時有僧睿興甚嘉焉什所譯經睿並參正什以姚秦弘始四年歲次辛丑起譯大品經二十七卷大集經二十四卷放光般若經二十卷小品經十卷華首經十三卷檢諸罪福經十卷妙法蓮華經七卷賢劫經七卷十住經五卷思益梵天問經四卷大樹緊那羅王所問經四卷持世經四卷維摩詰所說經三卷佛藏經四卷菩薩藏經三卷稱揚諸佛功德經三卷禪經三卷禪經祕要法三卷禪法要解二卷阿闍世經二卷阿蘭若習禪法經二卷禪要經二卷發菩提心經二卷自在王經二卷善信摩訶神呪經二卷新首楞嚴經二卷梵網經二卷大善權經二卷無量壽佛經一卷彌勒下生經一卷彌勒成佛經一卷金剛般若經一卷諸法無行經二卷菩提經一卷仁王護國般若波羅蜜經一卷遺教經一卷十二因緣觀經一卷菩薩訶色欲經一卷雜譬喻經一卷須摩提菩薩經一卷文殊悔過經一卷比丘應法行經一卷無思議光孩童菩薩經一卷大方等頂王經一卷大金色孔雀王經一卷莊嚴菩提心經一卷佛弟子化魔子偈誦經一卷太白魔王堅信經一卷開化魔經一卷魔業經一卷過魔法界經一卷佛問阿須輪大海有減經一卷魔王變身經一卷東方善華世界佛座震動經一卷陀羅尼法門六種動經一卷佛跡現千輻輪相經一卷佛臍化出菩薩經一卷往古生和佛國願行法典經一卷佛謦咳徹十方經一卷過去無邊光淨佛土經一卷佛變時會身經一卷無量樂佛土經一卷王后為蜣蜋經一卷佛心總持經一卷獼猴與婢共戲致變經一卷水牛王經一卷雀王經一卷兔王經一卷菩薩身為鴿王經一卷佛昔為鹿王經一卷牧牛經一卷虛空藏菩薩問持經幾功德經一卷觀世音經一卷彌勒菩薩本願待時成佛經一卷燈指因緣經一卷觀普賢菩薩經一卷睒本起經一卷觀佛三昧經一卷寶網經一卷文殊師利問菩提經一卷樂瓔珞莊嚴經一卷請觀世音經一卷思惟要略法經一卷持地經一卷菩薩戒本一卷十誦比丘戒本一卷大智度論一部一百卷般若經論集一部二十卷成實論一部十六卷十住毗婆沙論一部十四卷大莊嚴論一部十五卷十住論一部十四卷中論四卷百論二卷十二門論一卷馬鳴傳一卷龍樹菩薩傳一卷提婆菩薩傳一卷婆藪槃豆傳一卷實相論一卷至十一年戊申凡譯九十八部經合四百二十一卷僧睿僧肇道恆等筆受然什詞喻婉約出言成章神情鑒徹傲岸出群應機領會鮮有其匹且篤性仁厚泛愛為心虛己善誘終日無倦沙門佛馱耶舍此云覺名罽賓國人操行貞白戒節堅固儀止祥淑視瞻不凡五明四韋之論三藏十二之典特悟深致流辨無滯以姚秦弘始年達于姑臧什先師之勸興往邀興即敕迎并有贈遺笑而不受曰明旨既降便應載馳檀越待士既厚脫如羅什見處未敢聞命重使敦喻方至長安興自出迎別立新省於逍遙園四事供養並皆不受時至分衛一食而已耶舍為人赤髭善毗婆沙時人號為赤髭毗婆沙什既師之亦稱大毗婆沙師興凡所供給衣服臥具滿三間屋不以關心興為貨之造寺耶舍自姚秦弘始五年歲次壬寅創譯至十五年歲次壬子譯長阿含經二十二卷虛空藏菩薩神呪經一卷四分戒本一卷四分律四十五卷四部合六十九卷解座興施布絹萬匹悉皆不受竺佛念等筆受沙門弗若多羅此云功德華罽賓國人以戒節見稱備通三藏專精十誦計念四禪以姚秦弘始年中振錫入鎬姚主興待以上賓之禮法師羅什亦挹其風儀厚相崇敬特異常範至弘始六年歲次癸卯十月十七日集義學僧數百人請於長安中寺譯十誦律一部五十八卷羅什度語西秦乞伏氏都菀川沙門法堅或云堅公為量弘普利物戒心以乞伏西秦太初年間於河南國為乞伏乾歸譯方等王虛空藏所問經五卷演道俗業經一卷菩薩所生地經一卷孛經一卷賢首經一卷太子須大拏經一卷僮迦葉解難經一卷睒子經一卷無涯際持法門經一卷灌佛經一卷除恐災患經一卷七女本經一卷婦人遇辜經一卷阿難問事佛吉凶經一卷一十四部合一十八卷如須大拏經等在江陵辛寺譯庾爽筆受餘十部見始興録非唯西秦譯也北魏元氏都中山沙門釋曇覺一云慧覺涼州人牆仞連霄風神爽悟戒地清拔慧鑒通微於于殿國得賢愚經梵本以魏太武帝太平真君六年歲次乙酉於高昌郡天安寺譯一部十五卷沙門釋曇耀恆安石窟通樂寺僧自少出家器宇崇峙風鑒間約戒行堅貞以魏太武皇帝太平真君七年信崔晧邪佞崇重寇謙殘害釋種毀廢佛法未盈數年太武遭惡疾自生悔愧即誅崔晧埋之都市以口為廁令衆穢之太武帝崩子文成立稱興安元年興隆佛法至和平三年歲次壬寅曇耀為昭玄統慨前陵廢欣今再興自於北臺石窟寺對印度沙門集諸大德譯淨度三昧經一卷付法傳四卷凡二部合五卷沙門吉迦夜此云何事西域人遊化戒慮導物在心以魏孝文帝延興二年歲次壬子為僧統曇曜譯雜寶藏經等五部合二十五卷劉孝標筆受譯雜寶藏經十三卷付法藏因緣經傳六卷稱揚諸佛功德經三卷大方廣菩薩十地經一卷方便心論二卷北涼沮渠氏都姑臧沙門釋道龔虛心廣運弘利為道以北涼河西王神璽永初年間於張掖為蒙遜譯悲華經一部十卷寶梁經一部二卷沙門法衆高昌郡人亦以北涼沮渠氏永初年中於張掖為河西王蒙遜譯大方等檀特陀羅尼經一部四卷沙門僧伽陀西域人意存兼濟化誘居懷以北涼沮渠永初年中於張掖為蒙遜譯慧上菩薩問大善權經一部二卷沙門曇摩懺或云曇無讖此云法豐中印度人六歲出家日誦萬言初學小乘五明諸論後遇白頭禪師教以大乘十日交諍方悟大旨遂專大乘讖明解呪術所向皆驗西域號為大神呪師以北涼沮渠玄始元年歲次壬子至姑臧齎涅槃經前分十卷并菩薩戒止於傳舍慮失經本枕之而臥夜乃有神人牽讖墮地讖謂為盜如是三夕乃聞空中聲曰此是如來解脫之藏何為枕之讖慚悟乃安高處果有盜者夜捉提舉竟不能勝明旦讖持不以為重盜謂聖人悉來拜謝遜聞讖名厚遇請譯遂以玄始三年歲次甲寅起譯至玄始十年辛酉譯大般涅槃經一部四十卷大方等大集經一部三十一卷悲華經一部十卷菩薩地持經一部十卷菩薩戒經一部八卷優婆塞戒經一部六卷方等大雲經一部六卷虛空藏經一部五卷佛本行經一部五卷金光明經一部四卷海龍王經一部四卷楞伽經一部四卷信善經一部二卷無為道經一部二卷勝鬘經一卷羅摩伽經一卷須真天子經一卷居士請僧福田經一卷文陀竭王經一卷功德寶光菩薩經一卷腹中女聽經一卷決定罪福經一卷菩薩戒本經一卷菩薩戒壇文一卷總二十三部合一百四十八卷慧嵩筆受道俗數百人問難讖釋疑滯清辨若流涅槃三譯乃訖安陽侯沮渠京聲蒙遜從弟為人博識涉獵經史閲意內典奉持五戒絶於妻室不拘榮利常隨曇摩讖譯經西至于殿從印度法師佛馱斯那咨問道義斯那天才聰朗誦半億偈經明了禪法西方諸國號為人中師子安陽從那受學禪法諸祕要術口說梵本東歸於涼以北涼永和年中譯禪法要解一部二卷魏滅涼後南奔建康以宋孝武帝孝建元年達至京邑即以孝建二年歲次乙未於楊都竹園寺及鍾山定林上寺又譯治禪病祕法二卷淨飯王般涅槃經一卷八關齊經一卷普明王經一卷佛大僧大經一卷生死變識經一卷忿惒檀王經一卷長者音悅經一卷賢者律儀經一卷進學經一卷優婆塞五戒經一卷耶祇經一卷摩達經一卷五百梵志經一卷旃陀越經一卷五反覆大義經一卷迦葉禁戒經一卷弟子死復生經一卷弟子事佛吉凶經一卷五苦章句經一卷釋種問優婆塞經一卷波斯匿王喪母經一卷菩薩誓經一卷中陰經一卷佛母般泥洹經一卷夷比丘經一卷梵摩皇經一卷優婆塞五法經一卷五恐怖世經一卷末羅王經一卷觀彌勒菩薩上生兜率天經一卷觀世音觀經一卷諫王經一卷清信士阿夷扇經一卷弟子慢為耆域述經一卷總三十五部合三十六卷丹陽尹孟顗見而奇之資贍隆厚其所譯之經諷誦既久對衆弘宣文無滯礙沙門浮陀跋摩或云佛陀此言覺鎧西域人志操明直聰悟出群雖復遍集三藏偏善毗婆沙論常誦此部用為心要以北涼永和五年歲次乙亥為河西王子虔譯毗婆沙論一部一百卷道泰筆受屬魏滅涼經書被焚失四十卷今唯六十卷在沙門釋道泰譯大丈夫論一部二卷入大乘論一部二卷沙門釋智猛雍州新豐縣人稟性端厲明行清白少襲法服修業專誠諷誦之音以夜續日志度宏邈情深佛法西尋靈迹以北涼永和年中自西而返塗經玉門即於涼土譯般泥洹經一部二十卷失譯人名經五部一十七卷僧祐新集及釋道安涼土録並云是涼代失譯人名今還附入涼世目録雖不知譯人名庶知譯時代也大忍辱經十卷不退轉經四卷金剛三昧經一卷金輪王經一卷賢劫五百佛名一卷宋劉氏都建康沙門佛陀什此言覺壽罽賓國人少受業於彌沙塞部專精律品兼達禪要以宋廢帝滎陽王景平元年歲次癸亥七月到於楊都法顯先於師子國得彌沙塞律未譯而終京邑僧徒聞什善律衆請譯出即以其年冬於龍光寺譯為三十四卷并戒本一卷羯磨一卷合三十六卷于闐沙門智勝傳語沙門竺道生慧嚴等筆受侍中王練為檀越沙門曇摩蜜多此言法秀罽賓國人生而連眉為人沈邃甚有慧鑒常有善神潛形密護每之國境神必託夢告其王知去亦如之誓以遊方教化為志不拘名利初到燉煌即立禪閣植奈千株開園百畝學禪定衆趨者如雲以宋文帝元嘉十八年歲次甲子來至建業於祇洹寺譯禪祕要經五卷五門禪要法一卷觀普賢菩薩行法經一卷虛空藏菩薩觀經一卷諸法勇王經一卷佛升忉利天為母說法經一卷轉女身經一卷象腋經一卷郁伽長者所問經一卷虛空藏菩薩神呪經一卷總一十部合一十二卷善呪術傳畫迦毗羅像形沙門疆梁耶舍此言時稱西域人性剛直寡嗜欲善三藏多所諳知尤工禪思以宋文帝元嘉元年歲次甲子達于京邑帝深加賞敕住鍾山道林精舍譯觀藥王藥上二菩薩經一卷譯無量壽觀經一卷沙門僧含筆受沙門伊葉波羅此云自在西域人善通三藏解貫四含以宋文帝元嘉年中遊於彭城為比徐州刺史王仲德譯雜阿毗曇心論一部一十一卷刺史親自筆受沙門釋智嚴涼州人弱冠出家精勤為業納衣宴坐蔬食永歲不受別請分衛自資晉義熙十三年宋武伐姚泓還始興公王恢從駕觀山見嚴禪思即請還都然嚴道化所被幽顯咸伏先於西域得經梵本未譯以宋文帝元嘉四年歲次丁卯於楊都枳園寺共寶雲等譯普曜經八卷無盡意菩薩經六卷生經五卷廣博嚴淨不退轉輪經四卷菩薩瓔珞本業經二卷毗羅三昧經二卷阿那含經二卷四天王經一卷善德婆羅門問提婆達多經一卷一音顯正法經一卷調伏衆生業經一卷善德優婆塞經一卷法華三昧經一卷淨度三昧經一卷總一十四部合三十六卷然嚴未出家前曾受五戒有所虧犯後受大戒疑不得戒遂泛海至印度國咨問羅漢比丘時羅漢不決為詣彌勒彌勒答云得戒嚴甚喜焉沙門求那跋摩此言功德鎧罽賓國人即其國王之少子也洞明九部博曉四含深達律品妙入禪要誦經百餘萬言罽賓王薨衆請紹位恐為戒障遂林栖谷飲孤行山野遁迹人世儀形感物見者發心以宋文帝元嘉年中達于建業文帝殷勤問曰弟子常欲齊而不殺迫以身徇物不獲從志法師將何以教之跋摩曰夫道在心不在事法由己非由人且帝王與匹夫所修各異匹夫身賤名劣言令不威若不剋己苦躬將何為用帝王以四海為家兆民為子出一嘉言則士女咸悅布一善政則人神以和刑不夭命役無勞力則使風雨適時寒暖應節百穀滋繁桑麻鬱茂如此持戒齊亦大矣不殺亦衆矣寧在闕半日之食全一禽之命然後方為弘濟耶帝大悅曰跋摩法師開悟明達可與談於天人之際矣敕住祇桓寺供給隆厚即以元嘉年於楊都譯菩薩善戒經二十卷雜阿毗曇心論十二卷四分比丘尼羯磨一卷優婆塞五戒略論一卷三歸及優婆塞戒一卷沙彌威儀一卷五門禪要用一卷經律分異記一卷總七部合三十八卷證第二果沙門寶雲西涼州人自少出家精勤碩學志韻剛潔不偶世群求法懇惻忘身殉道遂以晉隆安年初西尋靈迹經羅剎之野聞天鼓之音禮釋迦影迹受羅漢之語歷遊西方善梵書語印度字音訓釋辭句悉皆備解後來長安復至江左諸翻譯人傳譯梵語於雲為最初與智嚴共同出經嚴既遷化雲獨宣譯以宋文帝元嘉年中於六合山寺譯佛本行讚經傳七卷付法藏經六卷佛所行讚經傳五卷新無量壽經二卷新淨度三昧經二卷總四部合十五卷沙門慧觀等友而善之沙門僧伽跋摩此言衆鎧印度國人少而棄俗戒德清峻善解律藏尤精雜心器宇宏肅道俗敬異其所譯經並文義詳允梵宋不差彭城王劉義康崇其戒範請以為師名重京邑以宋元嘉十年歲次癸酉於長干寺譯阿毗曇毗婆沙論一十四卷薩婆多摩德勒伽毗尼十卷大勇菩薩分別業報略集一卷龍樹菩薩勸發諸王要偈一卷請聖僧浴文一卷總五部合二十七卷寶雲傳語道場寺慧觀筆受沙門求那跋陀羅此言功德賢中印度人幼學五明四韋陀論志性明敏度量該博後遇雜心莫測涯際方悟佛法崇深投簪落彩專精志業博通三藏慈和恭恪事師盡禮捨小學大則深悟幽旨以宋文帝元嘉十二年來至楊都帝深重之敕住祇洹寺至宋元嘉二十年歲次癸未於楊都瓦官寺譯雜阿含經五十卷衆事分阿毗曇十二卷楞伽阿跋多羅寶經四卷央掘魔羅經四卷過去現在因果經四卷釋六十二見經四卷大方廣寶篋經二卷現在佛經三卷菩薩行方便神通變化經三卷淨度三昧經三卷相續解脫了義經三卷大法鼓經二卷阿蘭若習禪經二卷勝鬘師子吼一乘大方便經一卷無量壽經一卷賓頭盧突羅闍為優陀𤥻王說法經一卷般泥洹經一卷八吉祥經一卷無憂王經一卷出無量持門經一卷三小劫經一卷四食經一卷十二遊經一卷十二頭陀經一卷三因緣經一卷異處七處三觀經一卷十一想思念如來經一卷十二品生死經一卷十報法三統略經一卷罪福報應經一卷六齊八戒經一卷四人出現世間經一卷四品學法經一卷申兜本經一卷舅生經一卷那先經一卷日難經一卷君臣經一卷鞞摩肅經一卷鸚鵡經一卷負債為牛經一卷越難經一卷那賴經一卷二僑士經一卷釋摩男本經一卷阿蘭那經一卷老母經一卷樹提伽經一卷阿遬達經一卷大意經一卷目連降龍王經一卷阿難見伎樂啼哭無常經一卷舍利弗等比丘得身作證經一卷佛往慰迦葉病經一卷請槃特比丘經一卷佛命阿難詣最勝長者經一卷目連弟布施望報經一卷舍利弗般泥洹經一卷摩訶迦葉度貧母經一卷阿那律七念章經一卷雜藏經一卷虛空藏菩薩經一卷菩薩呵欲經一卷阿彌陀經一卷諸法無行經一卷貧子須賴經一卷無量義經一卷殺龍濟一國經一卷無涯際持法門經一卷墮珠著海中經一卷當來選擇諸惡世界經一卷阿難陀目佉尼阿離陀經一卷佛入甘露調正意經一卷過去行檀波羅蜜經一卷本行六波羅蜜經一卷第一義五相略集一卷總七十八部合一百六十一卷慧觀等筆受弟子法勇傳語荊州刺史南譙王劉義宣嘗請講華嚴經跋陀自愧未善宋言遂旦夕禮懺求觀世音忽夢有人白服持劍擎一人頭來謂陀曰何故憂耶陀以意對答曰不須多憂即便以劍易於陀首更安新頭問曰得無痛耶答云不痛既悟心神喜悅於是就講辨注若流後還楊都屬帝宴會王公畢集帝欲試其機辨并解人意不帝見其白首而謂之曰師今日不負遠來之意自外如何唯有一在賢即答言慕化遠來天子恩遇垂三十載今年七十一唯一死在帝大悅敕命近御而坐兼工呪術既善大乘時人號曰摩訶乘沙門曇無竭此言法勇姓李幽州黃龍人幼為沙彌禪修苦行持戒誦經為師所重嘗聞法顯躬踐佛國乃慨然有忘身之誓以宋武帝永初元年招集同志釋僧猛等二十五人共遊西域二十餘年自外並死唯竭獨還於罽賓國得梵經本元嘉末年達于楊都手自宣譯觀世音受記經一卷沙門釋慧簡以宋孝武帝大明元年歲次丁酉於鹿野寺譯灌頂藥師琉璃光佛經一卷商人求財經一卷閻王五天使經一卷善生子經一卷懈怠耕者經一卷釋迦畢罪經一卷貧窮老公經一卷殺身濟賈人經一卷舍衛城中人喪子發狂經一卷譬喻經一卷請賓頭盧法經一卷阿難見水光瑞經一卷呪願經一卷瞿曇彌記果經一卷學人亂意經一卷竊為沙門經一卷佛母般泥洹經一卷長者子六過出家經一卷獵師捨家學道事經一卷瞿曇彌經一卷旃闍摩暴志謗佛事經一卷二老男女見佛出家得道經一卷真僞沙門經一卷佛涅槃後諸比丘經一卷大力士出家得道經一卷總二十五部合二十五卷沙門功德直西域人道契既廣善誘日新以宋大明六年歲次壬寅到荊州為沙門釋玄暢譯菩薩念佛三昧經六卷無量門破魔陀羅尼經一卷暢刊正文義詞旨婉密而暢舒手出香掌中流水莫之測也沙門竺法卷印度人志性弘簡開利為務以宋明帝太始年中於廣州譯無盡意經十卷海意經七卷如來恩智不思議經五卷寶頂經五卷阿述陀菩薩經一卷三密底耶經一卷總六部合二十九卷沙門釋朔公於宋代在南海郡譯濡首菩薩無上清淨分衛經二卷沙門釋道嚴於宋世譯瓔珞本業經二卷佛藏大方等經一卷總二部合三卷沙門釋勇公於宋世譯空淨三昧經一卷車匿經一卷勸進學道經一卷梵女首意經一卷總四部合四卷沙門釋法海於宋世譯樂瓔珞莊嚴方便經一卷寂調意所問經一卷沙門釋先公於宋世譯月燈三昧經一卷
